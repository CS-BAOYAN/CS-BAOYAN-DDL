    <script>
      // Apply theme before paint to avoid FOUC.
      // Default = light; only enable dark when the user has explicitly opted in.
      (function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch {}
      })();
    </script>
